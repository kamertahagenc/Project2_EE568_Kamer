<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Phasor Labels</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        canvas {
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fafafa;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .instruction {
            color: #555;
            font-size: 15px;
            margin-bottom: 15px;
        }
        .legend {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-weight: bold;
        }
        .color-box {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>3-Phase Fundamental Phasor Addition</h2>
        <p class="instruction">The vectors are locked. Click and drag the <strong>numbers</strong> to position them neatly!</p>
        <canvas id="phasorCanvas" width="800" height="600"></canvas>

        <div class="legend">
            <div><span class="color-box" style="background-color: #e74c3c;"></span> Phase A</div>
            <div><span class="color-box" style="background-color: #27ae60;"></span> Phase B</div>
            <div><span class="color-box" style="background-color: #2980b9;"></span> Phase C</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('phasorCanvas');
        const ctx = canvas.getContext('2d');

        const originX = canvas.width / 2;
        const originY = canvas.height / 2;
        const scale = 80;

        const deg2rad = (deg) => deg * (Math.PI / 180);

        // Vector Data Sets
        const phases = [
            { color: "#e74c3c", vecs: [{ ang: 0, id: "1" }, { ang: 30, id: "8" }, { ang: 0, id: "7" }, { ang: 30, id: "2" }] },
            { color: "#27ae60", vecs: [{ ang: 240, id: "9" }, { ang: 270, id: "4" }, { ang: 240, id: "3" }, { ang: 270, id: "10" }] },
            { color: "#2980b9", vecs: [{ ang: 120, id: "5" }, { ang: 150, id: "12" }, { ang: 120, id: "11" }, { ang: 150, id: "6" }] }
        ];

        let staticVectors = [];
        let draggableLabels = [];

        // Pre-calculate the fixed paths for the vectors and initial positions for labels
        phases.forEach(phase => {
            let cx = originX;
            let cy = originY;

            phase.vecs.forEach(v => {
                const rad = deg2rad(-v.ang);
                const nx = cx + scale * Math.cos(rad);
                const ny = cy + scale * Math.sin(rad);

                // Store the locked vector geometry
                staticVectors.push({
                    fromX: cx, fromY: cy, toX: nx, toY: ny, color: phase.color, isResultant: false
                });

                // Initialize the label near the midpoint of its vector
                draggableLabels.push({
                    id: v.id,
                    x: cx + (nx - cx) / 2,
                    y: cy + (ny - cy) / 2 - 15, // slightly above the line
                    color: phase.color
                });

                cx = nx;
                cy = ny;
            });

            // Store the thick resultant vector (no label needed)
            staticVectors.push({
                fromX: originX, fromY: originY, toX: cx, toY: cy, color: phase.color, isResultant: true
            });
        });

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawArrow(v) {
            const headlen = 12;
            const dx = v.toX - v.fromX;
            const dy = v.toY - v.fromY;
            const angle = Math.atan2(dy, dx);

            ctx.beginPath();
            ctx.moveTo(v.fromX, v.fromY);
            ctx.lineTo(v.toX, v.toY);
            ctx.strokeStyle = v.color;
            ctx.lineWidth = v.isResultant ? 3 : 2;
            ctx.stroke();

            // Arrowhead
            ctx.beginPath();
            ctx.moveTo(v.toX, v.toY);
            ctx.lineTo(v.toX - headlen * Math.cos(angle - Math.PI / 7), v.toY - headlen * Math.sin(angle - Math.PI / 7));
            ctx.moveTo(v.toX, v.toY);
            ctx.lineTo(v.toX - headlen * Math.cos(angle + Math.PI / 7), v.toY - headlen * Math.sin(angle + Math.PI / 7));
            ctx.fillStyle = v.color;
            ctx.fill();
        }

        function render() {
            drawGrid();
            // Draw all locked vectors first
            staticVectors.forEach(drawArrow);

            // Draw all draggable labels on top
            draggableLabels.forEach(lbl => {
                ctx.fillStyle = "#222";
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Add a subtle white outline to the text so it's readable over lines
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.strokeText(lbl.id, lbl.x, lbl.y);
                ctx.fillText(lbl.id, lbl.x, lbl.y);
            });
        }

        // --- Drag Logic for Labels Only ---
        let dragTarget = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // Check if the user clicked near any label
            for (let i = draggableLabels.length - 1; i >= 0; i--) {
                let lbl = draggableLabels[i];
                let dist = Math.hypot(mx - lbl.x, my - lbl.y);

                if (dist < 18) { // 18px grab radius for the numbers
                    dragTarget = lbl;
                    dragOffsetX = mx - lbl.x;
                    dragOffsetY = my - lbl.y;

                    // Move the clicked label to the end of the array so it draws on top
                    draggableLabels.push(draggableLabels.splice(i, 1)[0]);
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!dragTarget) return;
            const rect = canvas.getBoundingClientRect();
            dragTarget.x = (e.clientX - rect.left) - dragOffsetX;
            dragTarget.y = (e.clientY - rect.top) - dragOffsetY;
            render();
        });

        canvas.addEventListener('mouseup', () => { dragTarget = null; });
        canvas.addEventListener('mouseleave', () => { dragTarget = null; });

        // Initial render
        render();
    </script>
</body>
</html>
